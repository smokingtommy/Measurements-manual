<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>測定器マニュアルビルダー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EEECE7;
  --border: #D8D5CC; --border2: #C8C4BA;
  --text: #1A1916; --text2: #6B6860; --text3: #9E9B93;
  --accent: #1D4ED8; --accent-bg: #EEF2FF; --accent-border: #BFCBF7; --accent-text: #1E3A8A;
  --success: #059669; --success-bg: #ECFDF5; --success-border: #A7F3D0;
  --mono: 'IBM Plex Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

.site-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.site-logo { font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.ks-badge { font-size: 10px; font-weight: 500; background: var(--accent-bg); color: var(--accent-text); border: 1px solid var(--accent-border); border-radius: 4px; padding: 1px 6px; }
.share-btn { font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
.share-btn:hover { background: var(--border); color: var(--text); }
.share-btn svg { width: 13px; height: 13px; }

.container { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

.step-bar { display: flex; align-items: center; margin-bottom: 2rem; }
.step-node { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); }
.step-node.active { color: var(--accent); font-weight: 500; }
.step-node.done { color: var(--success); }
.step-circle { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--text3); background: var(--surface); }
.step-node.active .step-circle { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); }
.step-node.done .step-circle { background: var(--success-bg); border-color: var(--success-border); color: var(--success); }
.step-line { flex: 1; height: 1px; background: var(--border); margin: 0 8px; }

.screen { display: none; }
.screen.active { display: block; }
.sec-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
.sub-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; margin-top: 1.5rem; }

.choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.choice-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1rem; cursor: pointer; transition: all 0.15s; }
.choice-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.choice-card.selected { border-color: var(--accent); background: var(--accent-bg); }
.choice-card .c-icon { font-size: 20px; margin-bottom: 8px; }
.choice-card .c-label { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.choice-card .c-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.choice-card.selected .c-label { color: var(--accent-text); }
.choice-card.selected .c-desc { color: var(--accent); opacity: 0.8; }

.tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.12s; }
.tag:hover { border-color: var(--border2); color: var(--text); }
.tag.on { background: var(--accent); border-color: var(--accent); color: #fff; }

.model-accordion { margin-top: 1rem; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
.model-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface2); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text2); user-select: none; }
.model-toggle:hover { background: var(--border); color: var(--text); }
.model-toggle .arr { font-size: 10px; transition: transform 0.2s; }
.model-toggle.open .arr { transform: rotate(180deg); }
.model-body { display: none; padding: 14px; border-top: 1px solid var(--border); }
.model-body.open { display: block; }
.model-body input { width: 100%; font-family: var(--mono); font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; background: var(--bg); color: var(--text); outline: none; }
.model-body input:focus { border-color: var(--accent); }
.model-hint { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.5; }
.chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip { font-family: var(--mono); font-size: 12px; display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px 10px; color: var(--text); }
.chip .rm { cursor: pointer; color: var(--text3); font-size: 15px; line-height: 1; }
.chip .rm:hover { color: var(--text); }

.btn { font-family: var(--sans); font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); padding: 8px 18px; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text); transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #1A40B8; border-color: #1A40B8; }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }

.ctx-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 1.5rem; }
.ctx-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.ctx-type { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
.ctx-name { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.3; }
.ctx-models { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.ctx-model-tag { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; color: var(--text); }
.ctx-edit { font-size: 11px; color: var(--text3); cursor: pointer; white-space: nowrap; padding-top: 3px; text-decoration: underline; text-underline-offset: 2px; }
.ctx-edit:hover { color: var(--accent); }
.ctx-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

.cand-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.cand-label { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.cand-list { display: flex; flex-wrap: wrap; gap: 6px; }
.cand-item { display: flex; align-items: center; gap: 6px; font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 3px 11px; color: var(--text2); }
.cand-item.primary { border-color: var(--accent-border); background: var(--accent-bg); color: var(--accent-text); }
.cand-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cand-item.primary .cand-dot { background: var(--accent); }
.cand-item .cand-dot { background: var(--border2); }

.phase-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.phase-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 12px; }
.phase-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.phase-card.selected { border-color: var(--accent); background: var(--accent-bg); }
.ph-num { font-size: 10px; font-weight: 700; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; margin-top: 1px; white-space: nowrap; flex-shrink: 0; }
.phase-card.selected .ph-num { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }
.ph-label { font-size: 14px; font-weight: 700; color: var(--text); }
.ph-desc { font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
.phase-card.selected .ph-label { color: var(--accent-text); }
.phase-card.selected .ph-desc { color: var(--accent); opacity: 0.8; }

.p3-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.p3-desc { font-size: 13px; color: var(--text2); margin-bottom: 1rem; line-height: 1.6; }
.product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; text-decoration: none; color: inherit; transition: all 0.15s; display: block; }
.product-card:hover { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.pc-cat { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.pc-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.pc-model { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.pc-arrow { font-size: 11px; color: var(--accent); margin-top: 8px; }

.placeholder-card { background: var(--surface); border: 1px dashed var(--border2); border-radius: var(--radius); padding: 2rem; text-align: center; }
.ph-icon { font-size: 28px; margin-bottom: 8px; }
.ph-title { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.ph-note { font-size: 12px; color: var(--text3); line-height: 1.6; }
.upload-badge { display: inline-block; font-size: 10px; font-weight: 500; background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; border-radius: 4px; padding: 2px 8px; margin-top: 8px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: min(420px, 90vw); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 1rem; line-height: 1.6; }
.url-box { display: flex; gap: 8px; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 1rem; }
.url-box span { font-family: var(--mono); font-size: 11px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.url-box button { font-family: var(--sans); font-size: 11px; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }
.url-box button:hover { background: #1A40B8; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
.site-footer { text-align: center; padding: 2rem; font-size: 11px; color: var(--text3); border-top: 1px solid var(--border); margin-top: 4rem; }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">測定器マニュアルビルダー <span class="ks-badge">Keysight</span></div>
  <button class="share-btn" onclick="openShare()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="3" r="1.5"/><circle cx="12" cy="13" r="1.5"/><circle cx="4" cy="8" r="1.5"/>
      <line x1="10.5" y1="3.8" x2="5.5" y2="7.2"/><line x1="5.5" y1="8.8" x2="10.5" y2="12.2"/>
    </svg>共有
  </button>
</header>

<main class="container">
  <div class="step-bar">
    <div class="step-node active" id="s1"><div class="step-circle">1</div></div>
    <div class="step-line"></div>
    <div class="step-node" id="s2"><div class="step-circle">2</div></div>
    <div class="step-line"></div>
    <div class="step-node" id="s3"><div class="step-circle">3</div></div>
  </div>

  <!-- PAGE 1 -->
  <div class="screen active" id="page1">
    <p class="sec-label">アプローチを選択</p>
    <div class="choice-grid">
      <div class="choice-card" id="c-instrument" onclick="selectEntry('instrument')">
        <div class="c-icon">🔬</div>
        <div class="c-label">測定器の種類から選ぶ</div>
        <div class="c-desc">手持ちの機器を選んでスタート</div>
      </div>
      <div class="choice-card" id="c-measurement" onclick="selectEntry('measurement')">
        <div class="c-icon">🎯</div>
        <div class="c-label">測定内容から選ぶ</div>
        <div class="c-desc">やりたいことからスタート</div>
      </div>
    </div>
    <div id="p1Detail" style="display:none;">
      <p class="sub-label" id="p1SubLabel"></p>
      <div class="tag-wrap" id="p1Options"></div>
      <div class="model-accordion" id="modelAccordion" style="display:none; margin-top:1rem;">
        <div class="model-toggle" id="modelToggle" onclick="toggleModelInput()">
          <span>型番を入力する（オプション）</span><span class="arr">▼</span>
        </div>
        <div class="model-body" id="modelBody">
          <input type="text" id="modelInput" placeholder="例: DSOX1204G, N9010B" />
          <div class="model-hint">Enterキーで追加。複数登録できます。</div>
          <div class="chip-wrap" id="modelChips"></div>
        </div>
      </div>
      <div style="margin-top:1.5rem;">
        <button class="btn btn-primary" onclick="goToPage2()">次へ →</button>
      </div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="screen" id="page2">
    <div class="ctx-card">
      <div class="ctx-top">
        <div>
          <div class="ctx-type" id="p2HeaderType"></div>
          <div class="ctx-name" id="p2HeaderName"></div>
          <div class="ctx-models" id="p2HeaderModels"></div>
        </div>
        <span class="ctx-edit" onclick="showPage(1)">変更</span>
      </div>
      <div class="cand-section">
        <div class="cand-label" id="p2CandLabel"></div>
        <div class="cand-list" id="p2CandList"></div>
      </div>
    </div>

    <div style="margin-bottom:1.5rem;">
      <p class="sec-label" id="p2FilterLabel"></p>
      <div class="tag-wrap" id="p2FilterOptions"></div>
    </div>

    <p class="sec-label">フェーズを選択</p>
    <div class="phase-grid">
      <div class="phase-card" id="ph-select" onclick="selectPhase('select')">
        <span class="ph-num">01</span>
        <div><div class="ph-label">製品選定</div><div class="ph-desc">最適な製品を選ぶ</div></div>
      </div>
      <div class="phase-card" id="ph-connect" onclick="selectPhase('connect')">
        <span class="ph-num">02</span>
        <div><div class="ph-label">接続工程</div><div class="ph-desc">機器のセットアップ</div></div>
      </div>
      <div class="phase-card" id="ph-measure" onclick="selectPhase('measure')">
        <span class="ph-num">03</span>
        <div><div class="ph-label">測定工程</div><div class="ph-desc">実際の測定手順</div></div>
      </div>
      <div class="phase-card" id="ph-analyze" onclick="selectPhase('analyze')">
        <span class="ph-num">04</span>
        <div><div class="ph-label">分析工程</div><div class="ph-desc">データの読み方・解析</div></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:0.5rem;">
      <button class="btn btn-ghost" onclick="showPage(1)">← 戻る</button>
      <button class="btn btn-primary" onclick="goToPage3()">次へ →</button>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="screen" id="page3">
    <div class="ctx-card">
      <div class="ctx-top">
        <div>
          <div class="ctx-type" id="p3HeaderType"></div>
          <div class="ctx-name" id="p3HeaderName"></div>
          <div class="ctx-models" id="p3HeaderModels"></div>
        </div>
        <span class="ctx-edit" onclick="showPage(2)">変更</span>
      </div>
      <hr class="ctx-divider">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span id="p3PhaseLabel" style="font-size:13px;font-weight:700;color:var(--text);"></span>
        <span id="p3FilterLabel" style="font-size:12px;color:var(--text2);"></span>
      </div>
    </div>
    <div id="p3Content"></div>
    <div style="margin-top:1.5rem;">
      <button class="btn btn-ghost" onclick="showPage(2)">← 戻る</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h3>このアプリを共有</h3>
    <p>このURLを共有することで、同じアプリをブラウザ上で使えます。</p>
    <div class="url-box"><span id="shareUrl"></span><button onclick="copyUrl()">コピー</button></div>
    <div class="modal-actions"><button class="btn" onclick="closeShare()">閉じる</button></div>
  </div>
</div>

<footer class="site-footer">測定器マニュアルビルダー &nbsp;·&nbsp; Keysight Technologies</footer>

<script>
const instrumentOptions = ['オシロスコープ','スペクトラムアナライザ','ネットワークアナライザ','マルチメータ','パワーメータ','信号発生器','LCRメータ'];
const measurementOptions = ['電圧 / 電流','周波数特性','Sパラメータ','EMC / ノイズ','インピーダンス','電力','デジタル信号'];

const instrumentToMeasurements = {
  'オシロスコープ':         ['電圧波形観測','周波数測定','立ち上がり / 立ち下がり時間','ジッタ解析','位相差測定','FFT解析','シリアルバス解析'],
  'スペクトラムアナライザ': ['周波数特性','EMC / ノイズ','電力スペクトル','位相ノイズ','ACPR測定','スプリアス測定'],
  'ネットワークアナライザ': ['Sパラメータ','インピーダンス測定','周波数特性','反射係数 / VSWR','群遅延測定','フィルタ特性評価'],
  'マルチメータ':           ['電圧 / 電流','抵抗測定','導通チェック','静電容量測定','周波数測定','温度測定'],
  'パワーメータ':           ['電力測定','平均電力','ピーク電力','パルス電力','電力比 (dB)'],
  '信号発生器':             ['波形出力確認','変調信号生成','スイープ測定','クロック注入','ノイズ注入'],
  'LCRメータ':              ['インピーダンス測定','L / C / R 測定','Q値 / D値測定','等価回路解析','周波数特性'],
};

const measurementToInstruments = {
  '電圧 / 電流':  [{name:'デジタルマルチメータ',primary:true},{name:'オシロスコープ',primary:true},{name:'データロガー',primary:false},{name:'パワーアナライザ',primary:false}],
  '周波数特性':   [{name:'ネットワークアナライザ',primary:true},{name:'スペクトラムアナライザ',primary:true},{name:'オシロスコープ',primary:false}],
  'Sパラメータ':  [{name:'ネットワークアナライザ',primary:true},{name:'VNA',primary:true},{name:'TDR オシロスコープ',primary:false}],
  'EMC / ノイズ': [{name:'スペクトラムアナライザ',primary:true},{name:'EMI レシーバ',primary:true},{name:'オシロスコープ',primary:false}],
  'インピーダンス':[{name:'LCR メータ',primary:true},{name:'インピーダンスアナライザ',primary:true},{name:'ネットワークアナライザ',primary:false}],
  '電力':         [{name:'パワーメータ',primary:true},{name:'パワーアナライザ',primary:true},{name:'オシロスコープ + 電流プローブ',primary:false}],
  'デジタル信号': [{name:'オシロスコープ',primary:true},{name:'ロジックアナライザ',primary:true},{name:'プロトコルアナライザ',primary:false}],
};

const keysightProducts = {
  'オシロスコープ': [
    {cat:'エントリー',name:'InfiniiVision 1000X',model:'DSOX1204G',url:'https://www.keysight.com/jp/ja/products/oscilloscopes/1000-x-series-oscilloscopes.html'},
    {cat:'ミッドレンジ',name:'InfiniiVision 3000T X',model:'DSOX3034T',url:'https://www.keysight.com/jp/ja/products/oscilloscopes/3000t-x-series-oscilloscopes.html'},
    {cat:'ハイエンド',name:'Infiniium S-Series',model:'MSOX6004A',url:'https://www.keysight.com/jp/ja/products/oscilloscopes/infiniium-s-series-oscilloscopes.html'},
  ],
  'スペクトラムアナライザ': [
    {cat:'ポータブル',name:'FieldFox N9914B',model:'N9914B',url:'https://www.keysight.com/jp/ja/products/spectrum-analyzers/fieldfox-handheld-analyzers.html'},
    {cat:'ベンチトップ',name:'X-Series N9010B',model:'N9010B',url:'https://www.keysight.com/jp/ja/products/spectrum-analyzers/x-series-signal-analyzers.html'},
  ],
  'ネットワークアナライザ': [
    {cat:'エントリー',name:'ENA E5063A',model:'E5063A',url:'https://www.keysight.com/jp/ja/products/network-analyzers/ena-series-network-analyzers.html'},
    {cat:'ハイエンド',name:'PNA-X N5247B',model:'N5247B',url:'https://www.keysight.com/jp/ja/products/network-analyzers/pna-series-network-analyzers.html'},
  ],
  'マルチメータ': [
    {cat:'ハンドヘルド',name:'U1253B',model:'U1253B',url:'https://www.keysight.com/jp/ja/products/digital-multimeters.html'},
    {cat:'ベンチトップ',name:'TrueVolt 34461A',model:'34461A',url:'https://www.keysight.com/jp/ja/products/digital-multimeters/truevolt-series-digital-multimeters.html'},
  ],
  'パワーメータ': [
    {cat:'USB パワーセンサ',name:'U2000 Series',model:'U2001A',url:'https://www.keysight.com/jp/ja/products/power-meters-sensors/usb-power-sensors.html'},
    {cat:'パワーメータ',name:'N1913A',model:'N1913A',url:'https://www.keysight.com/jp/ja/products/power-meters-sensors/power-meters.html'},
  ],
  '信号発生器': [
    {cat:'ファンクションジェネレータ',name:'33500B Series',model:'33522B',url:'https://www.keysight.com/jp/ja/products/arbitrary-waveform-generators/33500b-series.html'},
    {cat:'RF 信号発生器',name:'MXG N5182B',model:'N5182B',url:'https://www.keysight.com/jp/ja/products/signal-generators/mxg-x-series-rf-vector-signal-generators.html'},
  ],
  'LCRメータ': [
    {cat:'ハンドヘルド',name:'U1731C',model:'U1731C',url:'https://www.keysight.com/jp/ja/products/lcr-meters/handheld-lcr-meters.html'},
    {cat:'プレシジョン',name:'E4990A インピーダンスアナライザ',model:'E4990A',url:'https://www.keysight.com/jp/ja/products/lcr-meters/e4990a-impedance-analyzer.html'},
  ],
};

const measurementProducts = {
  '電圧 / 電流':  [{cat:'デジタルマルチメータ',name:'TrueVolt 34461A',model:'34461A',url:'https://www.keysight.com/jp/ja/products/digital-multimeters/truevolt-series-digital-multimeters.html'}],
  '周波数特性':   [{cat:'ネットワークアナライザ',name:'ENA E5063A',model:'E5063A',url:'https://www.keysight.com/jp/ja/products/network-analyzers/ena-series-network-analyzers.html'}],
  'Sパラメータ':  [{cat:'ネットワークアナライザ',name:'PNA-X N5247B',model:'N5247B',url:'https://www.keysight.com/jp/ja/products/network-analyzers/pna-series-network-analyzers.html'}],
  'EMC / ノイズ': [{cat:'スペクトラムアナライザ',name:'X-Series N9010B',model:'N9010B',url:'https://www.keysight.com/jp/ja/products/spectrum-analyzers/x-series-signal-analyzers.html'}],
  'インピーダンス':[{cat:'インピーダンスアナライザ',name:'E4990A',model:'E4990A',url:'https://www.keysight.com/jp/ja/products/lcr-meters/e4990a-impedance-analyzer.html'}],
  '電力':         [{cat:'パワーメータ',name:'N1913A',model:'N1913A',url:'https://www.keysight.com/jp/ja/products/power-meters-sensors/power-meters.html'}],
  'デジタル信号': [{cat:'オシロスコープ',name:'InfiniiVision 3000T X',model:'DSOX3034T',url:'https://www.keysight.com/jp/ja/products/oscilloscopes/3000t-x-series-oscilloscopes.html'}],
};

const phaseLabels = {select:'製品選定',connect:'接続工程',measure:'測定工程',analyze:'分析工程'};

let state = {
  entryType: null, entryValue: null, filterValue: null,
  modelNumbers: [], phase: null, measureContent: null,
};

/* PAGE 1 */
function selectEntry(type) {
  state.entryType = type; state.entryValue = null; state.filterValue = null;
  document.getElementById('c-instrument').classList.toggle('selected', type === 'instrument');
  document.getElementById('c-measurement').classList.toggle('selected', type === 'measurement');
  const opts = type === 'instrument' ? instrumentOptions : measurementOptions;
  document.getElementById('p1SubLabel').textContent = type === 'instrument' ? '測定器を選択' : '測定内容を選択';
  const container = document.getElementById('p1Options');
  container.innerHTML = '';
  opts.forEach(o => {
    const t = document.createElement('div'); t.className = 'tag'; t.textContent = o;
    t.onclick = () => { document.querySelectorAll('#p1Options .tag').forEach(x => x.classList.remove('on')); t.classList.add('on'); state.entryValue = o; };
    container.appendChild(t);
  });
  document.getElementById('modelAccordion').style.display = type === 'instrument' ? '' : 'none';
  document.getElementById('p1Detail').style.display = 'block';
}

function toggleModelInput() {
  document.getElementById('modelToggle').classList.toggle('open');
  document.getElementById('modelBody').classList.toggle('open');
  if (document.getElementById('modelBody').classList.contains('open')) setTimeout(() => document.getElementById('modelInput').focus(), 50);
}

document.getElementById('modelInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addModelNumber(); } });

function addModelNumber() {
  const inp = document.getElementById('modelInput');
  const val = inp.value.trim().toUpperCase();
  if (!val || state.modelNumbers.includes(val)) { inp.value = ''; return; }
  state.modelNumbers.push(val); inp.value = ''; renderModelChips();
}
function removeModel(idx) { state.modelNumbers.splice(idx, 1); renderModelChips(); }
function renderModelChips() {
  const c = document.getElementById('modelChips'); c.innerHTML = '';
  state.modelNumbers.forEach((m, i) => {
    const ch = document.createElement('span'); ch.className = 'chip';
    ch.innerHTML = `${escH(m)} <span class="rm" onclick="removeModel(${i})">×</span>`; c.appendChild(ch);
  });
}

function goToPage2() {
  const inp = document.getElementById('modelInput');
  if (inp && inp.value.trim()) addModelNumber();
  if (!state.entryValue) { const f = document.querySelector('#p1Options .tag'); if (f) f.click(); else return; }
  renderPage2(); showPage(2);
}

/* PAGE 2 */
function renderPage2() {
  document.getElementById('p2HeaderType').textContent = state.entryType === 'instrument' ? '測定器' : '測定内容';
  document.getElementById('p2HeaderName').textContent = state.entryValue;
  const modelsEl = document.getElementById('p2HeaderModels'); modelsEl.innerHTML = '';
  state.modelNumbers.forEach(m => { const t = document.createElement('span'); t.className = 'ctx-model-tag'; t.textContent = m; modelsEl.appendChild(t); });

  const candList = document.getElementById('p2CandList'); candList.innerHTML = '';
  if (state.entryType === 'instrument') {
    document.getElementById('p2CandLabel').textContent = '対応する測定内容';
    (instrumentToMeasurements[state.entryValue] || []).forEach(name => {
      const item = document.createElement('div'); item.className = 'cand-item primary';
      item.innerHTML = `<span class="cand-dot"></span>${escH(name)}`; candList.appendChild(item);
    });
    document.getElementById('p2FilterLabel').textContent = '測定内容を絞り込む（任意）';
    const fo = document.getElementById('p2FilterOptions'); fo.innerHTML = ''; state.filterValue = null;
    (instrumentToMeasurements[state.entryValue] || []).forEach(o => {
      const t = document.createElement('div'); t.className = 'tag'; t.textContent = o;
      t.onclick = () => { document.querySelectorAll('#p2FilterOptions .tag').forEach(x => x.classList.remove('on')); t.classList.add('on'); state.filterValue = o; };
      fo.appendChild(t);
    });
  } else {
    document.getElementById('p2CandLabel').textContent = '候補となる測定器';
    (measurementToInstruments[state.entryValue] || []).forEach(c => {
      const item = document.createElement('div'); item.className = 'cand-item' + (c.primary ? ' primary' : '');
      item.innerHTML = `<span class="cand-dot"></span>${escH(c.name)}`; candList.appendChild(item);
    });
    document.getElementById('p2FilterLabel').textContent = '測定器を絞り込む（任意）';
    const fo = document.getElementById('p2FilterOptions'); fo.innerHTML = ''; state.filterValue = null;
    (measurementToInstruments[state.entryValue] || []).forEach(c => {
      const t = document.createElement('div'); t.className = 'tag'; t.textContent = c.name;
      t.onclick = () => { document.querySelectorAll('#p2FilterOptions .tag').forEach(x => x.classList.remove('on')); t.classList.add('on'); state.filterValue = c.name; };
      fo.appendChild(t);
    });
  }
  ['select','connect','measure','analyze'].forEach(p => document.getElementById('ph-' + p).classList.remove('selected'));
  state.phase = null;
}

function selectPhase(phase) {
  state.phase = phase;
  ['select','connect','measure','analyze'].forEach(p => document.getElementById('ph-' + p).classList.toggle('selected', p === phase));
}

function goToPage3() {
  if (!state.phase) { document.getElementById('ph-select').classList.add('selected'); state.phase = 'select'; }
  renderPage3(); showPage(3);
}

/* PAGE 3 */
function renderPage3() {
  document.getElementById('p3HeaderType').textContent = state.entryType === 'instrument' ? '測定器' : '測定内容';
  document.getElementById('p3HeaderName').textContent = state.entryValue;
  const modelsEl = document.getElementById('p3HeaderModels'); modelsEl.innerHTML = '';
  state.modelNumbers.forEach(m => { const t = document.createElement('span'); t.className = 'ctx-model-tag'; t.textContent = m; modelsEl.appendChild(t); });
  document.getElementById('p3PhaseLabel').textContent = phaseLabels[state.phase];
  document.getElementById('p3FilterLabel').textContent = state.filterValue ? `／ ${state.filterValue}` : '';

  const content = document.getElementById('p3Content'); content.innerHTML = '';
  if (state.phase === 'select') renderSelectPhase(content);
  else if (state.phase === 'connect') renderConnectPhase(content);
  else if (state.phase === 'measure') renderMeasurePhase(content);
  else if (state.phase === 'analyze') renderAnalyzePhase(content);
}

function renderSelectPhase(container) {
  let products = [];
  if (state.entryType === 'instrument') {
    products = keysightProducts[state.entryValue] || [];
  } else {
    const key = state.filterValue || state.entryValue;
    products = measurementProducts[key] || measurementProducts[state.entryValue] || [];
  }
  let html = `<div class="p3-title">Keysight 製品ラインアップ</div><div class="p3-desc">製品ページから詳細スペック・価格・サポート情報をご確認いただけます。</div>`;
  if (products.length) {
    html += `<div class="product-grid">`;
    products.forEach(p => {
      html += `<a class="product-card" href="${p.url}" target="_blank" rel="noopener">
        <div class="pc-cat">${escH(p.cat)}</div><div class="pc-name">${escH(p.name)}</div>
        <div class="pc-model">${escH(p.model)}</div><div class="pc-arrow">製品ページを見る →</div></a>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="placeholder-card"><div class="ph-icon">🔗</div><div class="ph-title">製品リンクを準備中</div><div class="ph-note">該当製品のリンクは後ほど追加されます。</div></div>`;
  }
  container.innerHTML = html;
}

function renderConnectPhase(container) {
  container.innerHTML = `<div class="p3-title">接続工程 動画ガイド</div><div class="p3-desc">機器のセットアップ・接続手順を動画でご確認いただけます。</div>
    <div class="placeholder-card"><div class="ph-icon">🎬</div><div class="ph-title">動画を準備中</div>
    <div class="ph-note">接続手順の動画は後ほどアップロード予定です。</div><span class="upload-badge">Upload 予定</span></div>`;
}

function renderMeasurePhase(container) {
  if (state.entryType === 'instrument') {
    const opts = state.filterValue ? [state.filterValue] : (instrumentToMeasurements[state.entryValue] || []);
    let html = `<div class="p3-title">測定内容を選択</div><div class="p3-desc">測定する内容を選ぶと、対応する資料が表示されます。</div>
      <div class="tag-wrap" style="margin-bottom:1.5rem;" id="p3MeasureTags">`;
    opts.forEach(o => { html += `<div class="tag" onclick="selectMeasureContent('${escH(o)}')">${escH(o)}</div>`; });
    html += `</div><div id="p3MeasureResult"></div>`;
    container.innerHTML = html;
  } else {
    container.innerHTML = `<div class="p3-title">測定工程 資料</div><div class="p3-desc">「${escH(state.entryValue)}」の測定手順・参考資料です。</div>
      <div class="placeholder-card"><div class="ph-icon">📋</div><div class="ph-title">資料を準備中</div>
      <div class="ph-note">測定工程の資料・Webサイトは後ほど追加予定です。</div><span class="upload-badge">Upload 予定</span></div>`;
  }
}

function selectMeasureContent(value) {
  state.measureContent = value;
  document.querySelectorAll('#p3MeasureTags .tag').forEach(t => t.classList.toggle('on', t.textContent === value));
  document.getElementById('p3MeasureResult').innerHTML = `
    <div class="placeholder-card"><div class="ph-icon">📋</div>
    <div class="ph-title">「${escH(value)}」の資料を準備中</div>
    <div class="ph-note">対応するWebサイト・手順資料は後ほど追加予定です。</div><span class="upload-badge">Upload 予定</span></div>`;
}

function renderAnalyzePhase(container) {
  container.innerHTML = `<div class="p3-title">分析工程 資料</div><div class="p3-desc">データの読み方・解析手順の参考資料です。</div>
    <div class="placeholder-card"><div class="ph-icon">📊</div><div class="ph-title">資料を準備中</div>
    <div class="ph-note">分析工程の資料・Webサイトは後ほど追加予定です。</div><span class="upload-badge">Upload 予定</span></div>`;
}

/* NAV */
function showPage(n) {
  ['page1','page2','page3'].forEach(id => { const el = document.getElementById(id); el.classList.remove('active'); el.style.display = 'none'; });
  const target = document.getElementById('page' + n); target.classList.add('active'); target.style.display = 'block';
  ['s1','s2','s3'].forEach((id, idx) => {
    const el = document.getElementById(id); const num = idx + 1;
    el.classList.remove('active','done');
    if (num === n) { el.classList.add('active'); el.querySelector('.step-circle').textContent = num; }
    else if (num < n) { el.classList.add('done'); el.querySelector('.step-circle').textContent = '✓'; }
    else { el.querySelector('.step-circle').textContent = num; }
  });
}

/* SHARE */
function openShare() { document.getElementById('shareUrl').textContent = window.location.href; document.getElementById('shareModal').classList.add('open'); }
function closeShare() { document.getElementById('shareModal').classList.remove('open'); }
function copyUrl() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = event.target; btn.textContent = 'コピー済み ✓'; setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  });
}
document.getElementById('shareModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeShare(); });

function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
